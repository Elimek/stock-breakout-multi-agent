name: Build & Publish Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (cache)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/elimek/stock-breakout-multi-agent:latest
          cache-from: type=registry,ref=ghcr.io/elimek/stock-breakout-multi-agent:cache
          cache-to: type=registry,ref=ghcr.io/elimek/stock-breakout-multi-agent:cache,mode=max

      - name: Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/elimek/stock-breakout-multi-agent:latest
            ghcr.io/elimek/stock-breakout-multi-agent:${{ github.sha }}

      - name: Show image digest
        run: echo "Image digest = ${{ steps.build.outputs.digest }}"
